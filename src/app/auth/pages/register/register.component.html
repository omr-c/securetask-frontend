<div class="register-container">
  <mat-card class="register-card">
    <mat-card-header>
      <mat-card-title>Crear Cuenta</mat-card-title>
      <mat-card-subtitle>Unéte a SecureTask hoy mismo</mat-card-subtitle>
    </mat-card-header>

    <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
      <mat-card-content>
        <div class="name-row">
          <mat-form-field appearance="outline">
            <mat-label>Nombre</mat-label>
            <input matInput formControlName="firstname" placeholder="Nombre">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Apellido</mat-label>
            <input matInput formControlName="lastname" placeholder="Apellido">
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" placeholder="correo@ejemplo.com" type="email">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput formControlName="password" type="password" placeholder="Minimo 6 caracteres">
        </mat-form-field>
      </mat-card-content>

      <mat-card-actions>
        <button mat-button type="button" routerLink="/login">Ya tengo cuenta</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="registerForm.invalid">
          REGISTRARME
        </button>
      </mat-card-actions>
    </form>
  </mat-card>
</div>
