<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>SecureTask Login</mat-card-title>
      <mat-card-subtitle>Accede a tu gestor de tareas</mat-card-subtitle>
    </mat-card-header>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <mat-card-content>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" placeholder="ejemplo@correo.com" type="email">
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Email no valido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput formControlName="password" type="password">
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">La contraseña es obligatoria</mat-error>
        </mat-form-field>
      </mat-card-content>

     <mat-card-actions>
        <button mat-button type="button" routerLink="/register">
          ¿No tienes cuenta? Registrate
        </button>
        <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid">
          INGRESAR
        </button>
    </mat-card-actions>
    </form>
  </mat-card>
</div>
