<mat-toolbar color="primary">
  <span>SecureTask - Dashboard</span>
  <span class="spacer"></span>
  <button mat-flat-button color="accent" class="nav-button" (click)="openTaskForm()">
    <mat-icon>add</mat-icon> NUEVA TAREA
  </button>
  <button mat-icon-button (click)="logout()" title="Cerrar Sesion">
    <mat-icon>logout</mat-icon>
  </button>
</mat-toolbar>

<div class="container">
  <mat-card class="table-card">
    <mat-card-header>
      <mat-card-title>Tasks</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 full-width">
        
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef> ID </th>
          <td mat-cell *matCellDef="let task"> {{task.id}} </td>
        </ng-container>

        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef> Titulo </th>
          <td mat-cell *matCellDef="let task"> {{task.title}} </td>
        </ng-container>

        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef> Descripcion </th>
          <td mat-cell *matCellDef="let task"> {{task.description}} </td>
        </ng-container>

        <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Estado </th>
        <td mat-cell *matCellDef="let task">
            <span class="status-badge" [ngClass]="task.status?.toLowerCase()">
            {{ task.status }}
            </span>
        </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Acciones </th>
          <td mat-cell *matCellDef="let task">
            <button mat-icon-button color="accent" (click)="openTaskForm(task)" title="Editar">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteTask(task.id)" title="Borrar">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
